<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Chat Animation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --blush: #ffe3ea;
    --blush-2: #ffd0dc;
    --rose: #ff5d87;
    --rose-deep: #d81e5b;
    --cream: #fff6f4;
    --gold: #ffc857;
    --ink: #4a2438;
    --ink-soft: #8a5a6c;
    --white: #ffffff;
  }

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Quicksand', sans-serif;
  }

  html,body{
    height:100%;
  }

  body{
    background:
      radial-gradient(circle at 15% 20%, rgba(255,255,255,.5), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(255,255,255,.35), transparent 45%),
      linear-gradient(135deg, #ffd6e0, #ff9bb3 55%, #ff7aa2);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
    position:relative;
  }

  /* ---------- floating hearts background ---------- */
  #heartField{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:0;
  }

  .floatHeart{
    position:absolute;
    bottom:-40px;
    color:rgba(255,255,255,.55);
    font-size:18px;
    animation-name:floatUp;
    animation-timing-function:linear;
    animation-iteration-count:infinite;
    filter:drop-shadow(0 0 6px rgba(255,255,255,.3));
  }

  @keyframes floatUp{
    0%{ transform:translateY(0) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:1; }
    90%{ opacity:.8; }
    100%{ transform:translateY(-110vh) translateX(var(--drift,20px)) rotate(25deg); opacity:0; }
  }

  /* ---------- request screen ---------- */
  .request-screen{
    position:relative;
    z-index:2;
    display:flex;
    justify-content:center;
    align-items:center;
    width:100%;
  }

  .request-card{
    background:rgba(255,255,255,.85);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.6);
    border-radius:28px;
    padding:46px 40px 38px;
    width:340px;
    text-align:center;
    box-shadow:0 30px 60px rgba(216,30,91,.25), 0 0 0 1px rgba(255,255,255,.4) inset;
    animation:cardIn .6s cubic-bezier(.22,1,.36,1);
  }

  @keyframes cardIn{
    from{ opacity:0; transform:translateY(24px) scale(.96); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }

  .profile-ring{
    width:96px;
    height:96px;
    margin:0 auto 22px;
    border-radius:50%;
    background:linear-gradient(135deg, var(--rose), var(--rose-deep));
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    color:#fff;
    box-shadow:0 10px 24px rgba(216,30,91,.35);
    animation:heartbeat 1.8s ease-in-out infinite;
  }

  @keyframes heartbeat{
    0%,100%{ transform:scale(1); }
    15%{ transform:scale(1.08); }
    30%{ transform:scale(1); }
    45%{ transform:scale(1.06); }
    60%{ transform:scale(1); }
  }

  .request-card h2{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-weight:600;
    font-size:26px;
    color:var(--ink);
    margin-bottom:6px;
  }

  .request-card p{
    color:var(--ink-soft);
    font-size:14px;
    letter-spacing:.3px;
    margin-bottom:28px;
  }

  .buttons{
    display:flex;
    gap:12px;
  }

  .buttons button{
    flex:1;
    padding:13px 0;
    border:none;
    border-radius:16px;
    font-size:14px;
    font-weight:600;
    font-family:'Quicksand', sans-serif;
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    letter-spacing:.3px;
  }

  .buttons button:active{ transform:scale(.96); }

  .ignore{
    background:#fff;
    color:var(--ink-soft);
    border:1.5px solid #f1d7dd !important;
  }
  .ignore:hover{ background:#fdf1f4; }

  .accept{
    background:linear-gradient(135deg, var(--rose), var(--rose-deep));
    color:#fff;
    box-shadow:0 10px 22px rgba(216,30,91,.35);
  }
  .accept:hover{ box-shadow:0 12px 26px rgba(216,30,91,.45); }
  .accept:disabled{ opacity:.85; cursor:default; transform:none; }

  /* ---------- chat screen ---------- */
  #chatScreen{
    position:relative;
    z-index:2;
    justify-content:center;
    align-items:center;
    width:100%;
  }

  .phone{
    width:390px;
    height:780px;
    background:var(--white);
    border-radius:44px;
    overflow:hidden;
    box-shadow:0 40px 80px rgba(140,20,60,.35), 0 0 0 8px rgba(255,255,255,.5);
    display:flex;
    flex-direction:column;
    animation:phoneIn .5s cubic-bezier(.22,1,.36,1);
    border:1px solid rgba(255,255,255,.6);
  }

  @keyframes phoneIn{
    from{ opacity:0; transform:translateY(30px) scale(.97); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }

  .header{
    background:linear-gradient(120deg, var(--rose-deep), var(--rose) 65%, #ff8fa8);
    color:white;
    padding:18px 20px;
    display:flex;
    align-items:center;
    gap:13px;
    position:relative;
    box-shadow:0 4px 14px rgba(216,30,91,.25);
  }

  .avatar{
    width:46px;
    height:46px;
    border-radius:50%;
    background:rgba(255,255,255,.95);
    color:var(--rose-deep);
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    box-shadow:0 0 0 3px rgba(255,255,255,.35);
    animation:heartbeat 1.8s ease-in-out infinite;
  }

  .name{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-size:19px;
    font-weight:600;
    line-height:1.2;
  }

  .status{
    font-size:12px;
    opacity:.92;
    display:flex;
    align-items:center;
    gap:5px;
    margin-top:2px;
  }

  .status::before{
    content:'';
    width:7px;
    height:7px;
    border-radius:50%;
    background:#8dffb0;
    box-shadow:0 0 6px #8dffb0;
  }

  .chat{
    flex:1;
    padding:20px 16px 8px;
    overflow-y:auto;
    background:
      radial-gradient(circle at 20% 10%, rgba(255,214,224,.6), transparent 35%),
      radial-gradient(circle at 90% 30%, rgba(255,200,215,.5), transparent 40%),
      var(--cream);
    scroll-behavior:smooth;
  }

  .chat::-webkit-scrollbar{ width:5px; }
  .chat::-webkit-scrollbar-thumb{ background:var(--blush-2); border-radius:10px; }

  .message{
    max-width:76%;
    margin:9px 0;
    padding:11px 15px 9px;
    border-radius:20px;
    position:relative;
    animation:pop .38s cubic-bezier(.34,1.56,.64,1);
    word-wrap:break-word;
    font-size:14.5px;
    line-height:1.45;
    box-shadow:0 2px 8px rgba(140,20,60,.08);
  }

  .left{
    background:#fff;
    color:var(--ink);
    border-bottom-left-radius:6px;
    border:1px solid #ffe6ec;
  }

  .right{
    margin-left:auto;
    background:linear-gradient(135deg, var(--rose), var(--rose-deep));
    color:white;
    border-bottom-right-radius:6px;
    box-shadow:0 4px 14px rgba(216,30,91,.3);
  }

  .time{
    display:block;
    font-size:10.5px;
    opacity:.7;
    margin-top:5px;
    text-align:right;
    letter-spacing:.2px;
  }

  .typing{
    display:none;
    margin-top:6px;
  }

  .typingBubble{
    display:inline-flex;
    gap:5px;
    padding:12px 16px;
    background:#fff;
    border:1px solid #ffe6ec;
    border-radius:20px;
    border-bottom-left-radius:6px;
    box-shadow:0 2px 8px rgba(140,20,60,.08);
  }

  .dot{
    width:7px;
    height:7px;
    background:var(--rose);
    border-radius:50%;
    animation:blink 1.2s infinite;
  }

  .dot:nth-child(2){ animation-delay:.2s; }
  .dot:nth-child(3){ animation-delay:.4s; }

  @keyframes blink{
    0%,80%,100%{ opacity:.25; transform:translateY(0); }
    40%{ opacity:1; transform:translateY(-3px); }
  }

  @keyframes pop{
    from{ transform:translateY(16px) scale(.92); opacity:0; }
    to{ transform:translateY(0) scale(1); opacity:1; }
  }

  @media (max-width:420px){
    .phone{ width:100vw; height:100vh; border-radius:0; }
    .request-card{ width:88vw; }
  }
</style>
</head>

<body>

<div id="heartField"></div>

<audio id="audio" autoplay loop>
  <source src="./Tu Hai To Dil Dhadakta Hai.mp3" type="audio/mpeg" />
</audio>

<div id="requestScreen" class="request-screen">
  <div class="request-card">
    <div class="profile-ring">❤</div>
    <h2>Nikita Tank</h2>
    <p>sent you a request</p>
    <div class="buttons">
      <button class="ignore">Ignore</button>
      <button class="accept">Accept</button>
    </div>
  </div>
</div>

<div id="chatScreen" style="display:none">
  <div class="phone">
    <div class="header">
      <div class="avatar">❤</div>
      <div>
        <div class="name">Life</div>
        <div class="status">My Everything</div>
      </div>
    </div>

    <div class="chat" id="chat">
      <div class="typing" id="typing">
        <div class="typingBubble">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  /* ---------- ambient floating hearts ---------- */
  const heartField = document.getElementById("heartField");
  const heartGlyphs = ["❤","💕","💗","♡"];

  function spawnHeart(){
    const h = document.createElement("div");
    h.className = "floatHeart";
    h.textContent = heartGlyphs[Math.floor(Math.random()*heartGlyphs.length)];
    const left = Math.random()*100;
    const duration = 9 + Math.random()*10;
    const size = 12 + Math.random()*16;
    const drift = (Math.random()*80 - 40) + "px";
    h.style.left = left + "vw";
    h.style.fontSize = size + "px";
    h.style.animationDuration = duration + "s";
    h.style.setProperty("--drift", drift);
    heartField.appendChild(h);
    setTimeout(()=>h.remove(), duration*1000 + 500);
  }

  for(let i=0;i<8;i++) setTimeout(spawnHeart, i*700);
  setInterval(spawnHeart, 1400);

  /* ---------- request screen ---------- */
  const AUTO_ACCEPT_SECONDS = 4; // change this to adjust the delay

  function ignoreRequest(){
    clearTimeout(autoAcceptTimer);
    const card = document.querySelector(".request-card");
    card.style.transition = "opacity .3s ease, transform .3s ease";
    card.style.opacity = "0";
    card.style.transform = "translateY(10px) scale(.97)";
  }

  function acceptRequest(){
    clearTimeout(autoAcceptTimer);
    const btn = document.querySelector(".accept");
    if(btn.disabled) return; // already accepted
    btn.innerHTML = "✔ Accepted";
    btn.disabled = true;

    setTimeout(()=>{
      document.getElementById("requestScreen").style.display = "none";
      document.getElementById("chatScreen").style.display = "flex";
      startChat();
    }, 1300);
  }

  /* auto-accept the request after a short delay */
  const autoAcceptTimer = setTimeout(acceptRequest, AUTO_ACCEPT_SECONDS * 1000);

  /* ---------- conversation loading ---------- */
  let conversation = [];

  const fallbackConversation = [
    { sender_name:"Emma", content:"hii 🤭", timestamp_ms: Date.now() },
    { sender_name:"Rajan Kashiyani", content:"heyy, I was just thinking about you", timestamp_ms: Date.now() },
    { sender_name:"Emma", content:"awww really? 🥺", timestamp_ms: Date.now() },
    { sender_name:"Rajan Kashiyani", content:"always ❤️", timestamp_ms: Date.now() },
    { sender_name:"Emma", content:"you're my favourite person", timestamp_ms: Date.now() },
    { sender_name:"Rajan Kashiyani", content:"and you're my whole heart 💗", timestamp_ms: Date.now() }
  ];

  function fixEncoding(str){
    try { return decodeURIComponent(escape(str)); }
    catch { return str; }
  }

  async function loadConversation(){
    let temp;
    try{
      const response = await fetch("./chat.json");
      if(!response.ok) throw new Error("Failed to load chat.json");
      temp = await response.json();
    }catch(err){
      console.warn("chat.json not found, using sample conversation:", err.message);
      temp = fallbackConversation;
    }

    conversation = temp.map((element, index) => ({
      side: element.sender_name === "Rajan Kashiyani" ? "right" : "left",
      message: fixEncoding(element.content),
      timer: index < 10 ? 2200 : 900,
      timestamp_ms: element.timestamp_ms
    }));
  }

  loadConversation();

  /* ---------- playback ---------- */
  const chat = document.getElementById("chat");
  const typing = document.getElementById("typing");

  function currentTime(timestamp_ms){
    const d = new Date(timestamp_ms);
    const day = String(d.getDate()).padStart(2,'0');
    const month = String(d.getMonth()+1).padStart(2,'0');
    const year = d.getFullYear();
    const hours = String(d.getHours()).padStart(2,'0');
    const minutes = String(d.getMinutes()).padStart(2,'0');
    return `${day}/${month}/${year} ${hours}:${minutes}`;
  }

  function addMessage(msg){
    typing.style.display = "none";

    const div = document.createElement("div");
    div.className = "message " + msg.side;
    div.innerHTML = `${msg.message}<span class="time">${currentTime(msg.timestamp_ms)}</span>`;

    chat.insertBefore(div, typing);
    chat.scrollTop = chat.scrollHeight;
  }

  let index = 0;
  let started = false;

  function playConversation(){
    if(index >= conversation.length){
      typing.style.display = "none";
      return;
    }

    typing.style.display = "block";
    chat.appendChild(typing);
    chat.scrollTop = chat.scrollHeight;

    setTimeout(()=>{
      addMessage(conversation[index]);
      index++;
      playConversation();
    }, conversation[index].timer);
  }

  async function startChat(){
    if(started) return;
    started = true;
    if(conversation.length === 0){
      await loadConversation();
    }
    playConversation();
  }
</script>

</body>
</html>
